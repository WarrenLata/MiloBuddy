version: '3.8'
services:
  backend:
    build: ./backend
    image: milo-backend:dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    image: milo-frontend:dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
