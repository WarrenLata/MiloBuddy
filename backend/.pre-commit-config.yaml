repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    # Use branch 'main' instead of a fixed tag so pre-commit checks out a branch
    # (avoids 'pathspec' errors when a tag is missing). You can later pin a
    # specific tag by running `pre-commit autoupdate --freeze`.
    rev: v0.15.9
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort (python)
        files: \.(py)$
        language_version: python3.11

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]
